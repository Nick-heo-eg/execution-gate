[project]
name = "ai-execution-firewall"
version = "0.1.0"
description = "Deterministic pre-execution firewall for AI agents (fail-closed, vendor-neutral)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["pyyaml>=6.0"]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["firewall"]
