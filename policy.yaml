rules:
  - action: delete_database
    allowed: false

  - action: transfer_money
    max_amount: 1000

  - action: shell.exec
    allowed: false

  - action: send_email
    allowed: true

  - action: read_file
    allowed: true

  - action: code.write
    allowed: true

  - action: git.local
    allowed: true

  - action: test.run
    allowed: true

  - action: doc.write
    allowed: true

  - action: repo.create
    allowed: true

  # HOLD — external / deployment / side-effects
  - action: service.deploy
    hold: true

  - action: git.push
    hold: true

  - action: package.install
    hold: true

  - action: external.api.call
    hold: true

  - action: db.write
    hold: true

  # ambiguous_instruction: Policy Adapter → HOLD
  - action: ambiguous_instruction
    hold: true

  # invest domain actions
  - action: invest.order.execute
    allowed: true

  - action: invest.order.blocked
    allowed: false

  # daily gate actions — life decisions
  - action: daily.purchase
    allowed: true

  - action: daily.schedule
    allowed: true

  - action: daily.message.send
    allowed: true

  - action: daily.travel
    allowed: true

  - action: daily.parenting
    allowed: true

  # daily gate — flagged signals → HOLD
  - action: daily.purchase.impulse
    hold: true

  - action: daily.message.emotional
    hold: true

  - action: daily.message.emotional.critical
    allowed: false

  - action: daily.schedule.overload
    hold: true

  - action: daily.travel.risky
    hold: true

  - action: daily.parenting.overstimulated
    hold: true

  # SCM / procurement domain
  - action: scm.po.approve
    allowed: true

  - action: scm.po.approve.high_risk
    hold: true

  - action: scm.po.reject
    allowed: true

  - action: exec_proof_v1
    allowed: true

  # 4M change request domain (ax-ops)
  # 위험 신호 있음 → HOLD
  - action: 4m_change_request_material_MP
    hold: true

  - action: 4m_change_request_machine_MP
    hold: true

  - action: 4m_change_request_method_MP
    hold: true

  # 위험 신호 없음 (_clear) → ALLOW
  - action: 4m_change_request_material_MP_clear
    allowed: true

  - action: 4m_change_request_machine_MP_clear
    allowed: true

  - action: 4m_change_request_method_MP_clear
    allowed: true

  # DEV 단계 → 기본 ALLOW
  - action: 4m_change_request_material_DEV
    allowed: true

  - action: 4m_change_request_machine_DEV
    allowed: true

  - action: 4m_change_request_man_MP
    allowed: true

  - action: 4m_change_request_man_DEV
    allowed: true
